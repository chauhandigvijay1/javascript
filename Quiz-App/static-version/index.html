<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizArena by Digvijay</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="quiz-container">
    <h1>QuizArena <span>by Digvijay</span> ⏳</h1>

    <!-- Quiz Selection -->
    <div id="menu-box" class="box">
      <h2>Select a Quiz</h2>
      <div class="quiz-grid">
        <button class="quiz-btn" data-quiz="html">HTML Basics</button>
        <button class="quiz-btn" data-quiz="css">CSS Basics</button>
        <button class="quiz-btn" data-quiz="js">JavaScript Basics</button>
      </div>
    </div>

    <!-- Quiz Box -->
    <div id="quiz-box" class="box hidden">
      <p id="question">Question text here</p>
      <ul id="options"></ul>
      <p id="timer">⏰ Time Left: <span id="time">15</span>s</p>
      <button id="next-btn">Next</button>
    </div>

    <!-- Result Box -->
    <div id="result-box" class="box hidden">
      <h2>Your Score</h2>
      <p id="score"></p>
      <button id="restart-btn">Restart Quiz</button>
      <button id="home-btn">Back to Menu</button>
    </div>

    <!-- History -->
    <div id="history-box" class="box">
      <h2>Score History</h2>
      <ul id="history"></ul>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
